<!DOCTYPE html>
<html lang="en">
<head>

    }

      width: min(92%, 800px);

      padding-top: 60px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 8px 24px rgba(213, 215, 219, 0.08);
    }

    th,
    td {
      padding: 14px;
      border: 1px solid #dbe4ef;
      text-align: left;
      background: #dbe4ef;
    }

      background: #2563eb;
      color: white;
    }

    .back-link {

      margin-top: 20px;

<body>

     <table align="center" border="1" style="background-color: black;">

                <th width="100">Name</th>

                <th width="150">Course Name</th>
            </tr>

            <tbody align="center" id="enrolledtable"></tbody> <!--Table body where rows will be inserted -->
        </table>


        <script type="text/javascript">

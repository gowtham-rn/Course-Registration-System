<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Course</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      width: min(90%, 480px);
      margin: 0 auto;
      padding-top: 60px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    form {
      background: white;
      padding: 28px;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 15px;
    }

    button,
    .back-link {
      display: inline-block;
      padding: 12px 18px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .back-link {
      margin-top: 18px;
      background: #475569;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Register Form</h1>

    <form id="registerForm" action="http://localhost:8080/courses/enrolled" method="post">
      <label for="name">Name</label>
      <input type="text" name="name" placeholder="Enter your name" required>

      <label for="email">Email ID</label>
      <input type="email"  name="emailId" placeholder="Enter your email ID" required>

      <label for="course">Select Course</label>
      <select id="course" name="courseName" required>
        <option value="">Choose a course</option>
        <option value="Java">Java</option>
        <option value="Spring Boot">Spring Boot</option>
        <option value="Python">Python</option>
        <option value="AWS">AWS</option>
        <option value="Cybersecurity">Cybersecurity</option>
      </select>

      <button type="submit">Register</button>
    </form>

    <a class="back-link" href="index.html">Back to Home</a>
  </main>

  <script>
    const registerForm = document.getElementById("registerForm");

    registerForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const formData = new FormData(registerForm);
      const data = new URLSearchParams(formData);

      fetch(registerForm.action, {
        method: registerForm.method,
        body: data
      })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Backend returned status " + response.status);
          }

          return response.text();
        })
        .then(function (message) {
          sessionStorage.setItem("registrationMessage", message);
          window.location.href = "success.html";
        })
        .catch(function (error) {
          console.error("Registration request failed:", error);
          sessionStorage.setItem("registrationMessage", "Registration failed: " + error.message);
          window.location.href = "success.html";
        });
    });
  </script>
</body>
</html>
